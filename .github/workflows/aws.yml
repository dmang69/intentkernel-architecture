name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/<GITHUB_DEPLOY_ROLE>
          aws-region: us-west-2

      - name: Set up Node.js (optional)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install

      - name: Build project
        run: |
          npm run build

      # Replace this with your actual deployment command
      - name: Deploy to AWS
        run: |
          echo "Running deployment..."
          # Example: AWS CDK
          # npx cdk deploy --require-approval never
          #
          # Example: Serverless Framework
          # npx serverless deploy
          #
          # Example: Sync static site to S3
          # aws s3 sync dist/ s3://my-bucket-name --delete
